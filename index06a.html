<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dodge Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            text-align: center;
            width: 100vw;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ui-panel {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 15px;
        }

        canvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
            width: 100%;
            max-width: 400px;
            height: auto;
            cursor: grab;
            z-index: 2;
        }
        
        canvas:active {
            cursor: grabbing;
        }

        #screen-overlay {
            position: absolute;
            top: 44px;
            left: 0;
            width: 100%;
            height: calc(100% - 44px);
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.3s ease;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        p {
            margin-bottom: 15px;
            color: #ccc;
            font-size: 14px;
        }

        .difficulty-settings {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .difficulty-settings label {
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #eee;
            transition: color 0.2s;
        }
        
        .difficulty-settings label:hover {
            color: #00ffcc;
        }

        .difficulty-settings input[type="radio"] {
            accent-color: #00ffcc;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        button.play-btn {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #00ffcc;
            color: #1a1a1a;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
        }

        button.play-btn:hover {
            background: #00e6b8;
            transform: scale(1.05);
        }

        button.play-btn:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 25px;
            font-size: 12px;
            color: #777;
        }

        /* Swipe Zone below Canvas */
        #swipe-zone {
            display: none; /* Hidden on desktop */
            width: 100%;
            max-width: 400px;
            height: 80px;
            margin-top: 5px;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.02),
                rgba(255, 255, 255, 0.02) 10px,
                rgba(255, 255, 255, 0.05) 10px,
                rgba(255, 255, 255, 0.05) 20px
            );
            border: 2px dashed #444;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Visible Mobile Controls Styles */
        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
            padding: 0;
            margin-top: 5px;
        }

        .dir-btn {
            flex: 1;
            margin: 0 5px;
            padding: 15px 0;
            font-size: 18px;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            border-radius: 10px;
            box-shadow: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .dir-btn:first-child {
            margin-left: 0;
        }
        
        .dir-btn:last-child {
            margin-right: 0;
        }

        .dir-btn:active, .dir-btn.active {
            background: rgba(0, 255, 204, 0.4);
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            #swipe-zone {
                display: flex;
            }
            #mobile-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-panel">
            <div id="score-display">Score: 0</div>
            <div id="high-score-display">High Score: 0</div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <div id="swipe-zone">
            <span>⟷ SWIPE ZONE ⟷</span>
        </div>

        <div id="screen-overlay">
            <h1 id="overlay-title">DODGE</h1>
            <p id="overlay-desc">Use Swipe Pad, Buttons, or Arrows</p>
            
            <div class="difficulty-settings" id="difficulty-panel">
                <label><input type="radio" name="difficulty" value="easy" checked> Easy</label>
                <label><input type="radio" name="difficulty" value="medium"> Medium</label>
                <label><input type="radio" name="difficulty" value="hard"> Hard</label>
            </div>

            <button id="start-btn" class="play-btn">PLAY</button>
            <div class="controls-hint">Tip: The longer you survive, the faster they fall!</div>
        </div>

        <div id="mobile-controls">
            <button id="btn-left" class="dir-btn">◀ LEFT</button>
            <button id="btn-right" class="dir-btn">RIGHT ▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const overlay = document.getElementById('screen-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');
        const diffPanel = document.getElementById('difficulty-panel');
        const swipeZone = document.getElementById('swipe-zone');
        
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        // Game State Variables
        let gameActive = false;
        let score = 0;
        let highScore = 0;
        let currentDiff = 'easy';

        try {
            highScore = localStorage.getItem('dodge_highScore') || 0;
        } catch (e) {
            console.warn("localStorage is blocked.");
        }
        highScoreDisplay.textContent = `High Score: ${highScore}`;

        // Difficulty Configurations
        const diffConfig = {
            easy: { baseSpeed: 1.5, speedMultiplierFactor: 0.01, spawnRate: 50, spawnDecreaseRate: 5, minSpawn: 25 },
            medium: { baseSpeed: 2.2, speedMultiplierFactor: 0.025, spawnRate: 45, spawnDecreaseRate: 4, minSpawn: 20 },
            hard: { baseSpeed: 3.0, speedMultiplierFactor: 0.05, spawnRate: 40, spawnDecreaseRate: 3, minSpawn: 15 }
        };

        let frameCount = 0;
        let speedMultiplier = 1;

        const player = {
            x: 185,
            y: 440,
            width: 30,
            height: 30,
            color: '#00ffcc',
            speed: 7,
            dx: 0
        };

        let enemies = [];

        // Input Trackers
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };
        let isTouchingLeft = false;
        let isTouchingRight = false;
        let isSwiping = false; 

        // Keyboard Event Listeners
        document.addEventListener('keydown', (e) => { if (e.key in keys) keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { if (e.key in keys) keys[e.key] = false; });

        // Unified Swiping Function for both Canvas and Swipe Zone
        function handleSwipeTracker(e) {
            if (!gameActive) return;
            e.preventDefault(); 
            isSwiping = true;
            
            const touch = e.touches[0];
            
            // Map the touch relative to the CANVAS width, even if swiping in the box below
            const canvasRect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / canvasRect.width; 
            const touchX = (touch.clientX - canvasRect.left) * scaleX;
            
            player.x = touchX - (player.width / 2);
            
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }
        }

        const handleSwipeEnd = () => { isSwiping = false; };

        // Attach to Canvas
        canvas.addEventListener('touchstart', handleSwipeTracker, { passive: false });
        canvas.addEventListener('touchmove', handleSwipeTracker, { passive: false });
        canvas.addEventListener('touchend', handleSwipeEnd);

        // Attach to new Swipe Zone
        swipeZone.addEventListener('touchstart', handleSwipeTracker, { passive: false });
        swipeZone.addEventListener('touchmove', handleSwipeTracker, { passive: false });
        swipeZone.addEventListener('touchend', handleSwipeEnd);

        // Visible Mobile Button Listeners
        const handleLeftDown = (e) => { e.preventDefault(); isTouchingLeft = true; btnLeft.classList.add('active'); };
        const handleLeftUp = (e) => { e.preventDefault(); isTouchingLeft = false; btnLeft.classList.remove('active'); };
        const handleRightDown = (e) => { e.preventDefault(); isTouchingRight = true; btnRight.classList.add('active'); };
        const handleRightUp = (e) => { e.preventDefault(); isTouchingRight = false; btnRight.classList.remove('active'); };

        btnLeft.addEventListener('touchstart', handleLeftDown, { passive: false });
        btnLeft.addEventListener('touchend', handleLeftUp);
        btnLeft.addEventListener('mousedown', handleLeftDown);
        btnLeft.addEventListener('mouseup', handleLeftUp);
        btnLeft.addEventListener('mouseleave', handleLeftUp);

        btnRight.addEventListener('touchstart', handleRightDown, { passive: false });
        btnRight.addEventListener('touchend', handleRightUp);
        btnRight.addEventListener('mousedown', handleRightDown);
        btnRight.addEventListener('mouseup', handleRightUp);
        btnRight.addEventListener('mouseleave', handleRightUp);

        startBtn.addEventListener('click', startGame);

        function startGame() {
            const selectedRadio = document.querySelector('input[name="difficulty"]:checked');
            if(selectedRadio) currentDiff = selectedRadio.value;

            enemies = [];
            score = 0;
            frameCount = 0;
            speedMultiplier = 1;
            player.x = canvas.width / 2 - player.width / 2;
            player.dx = 0;
            isTouchingLeft = false;
            isTouchingRight = false;
            isSwiping = false;
            scoreDisplay.textContent = `Score: ${score}`;
            
            overlay.style.display = 'none';
            gameActive = true;
            
            requestAnimationFrame(update);
        }

        function createEnemy() {
            const size = Math.random() * (40 - 15) + 15; 
            const x = Math.random() * (canvas.width - size);
            const colors = ['#ff4757', '#ffa502', '#ff6b81', '#ff4757', '#de1f1f'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            let config = diffConfig[currentDiff];
            enemies.push({
                x: x,
                y: -size,
                width: size,
                height: size,
                speed: (Math.random() * (2 - 0.5) + 0.5) + config.baseSpeed,
                color: color
            });
        }

        function handlePlayerMovement() {
            if (!isSwiping) {
                if (keys.ArrowLeft || keys.a || isTouchingLeft) {
                    player.dx = -player.speed;
                } else if (keys.ArrowRight || keys.d || isTouchingRight) {
                    player.dx = player.speed;
                } else {
                    player.dx = 0;
                }

                player.x += player.dx;

                if (player.x < 0) player.x = 0;
                if (player.x + player.width > canvas.width) {
                    player.x = canvas.width - player.width;
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function gameOver() {
            gameActive = false;
            
            if (score > highScore) {
                highScore = score;
                try {
                    localStorage.setItem('dodge_highScore', highScore);
                } catch (e) {}
                highScoreDisplay.textContent = `High Score: ${highScore}`;
            }

            overlayTitle.textContent = "GAME OVER";
            overlayTitle.style.color = "#ff4757";
            overlayTitle.style.textShadow = "0 0 10px rgba(255, 71, 87, 0.5)";
            overlayDesc.textContent = `Final Score: ${score}`;
            startBtn.textContent = "TRY AGAIN";
            
            diffPanel.style.display = 'flex';
            overlay.style.display = 'flex';
            
            isTouchingLeft = false;
            isTouchingRight = false;
            isSwiping = false;
            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handlePlayerMovement();

            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            frameCount++;
            
            let config = diffConfig[currentDiff];
            speedMultiplier = 1 + (score * config.speedMultiplierFactor); 
            
            let dynamicSpawnRate = Math.max(
                config.minSpawn, 
                config.spawnRate - Math.floor(score / config.spawnDecreaseRate)
            );

            if (frameCount % dynamicSpawnRate === 0) {
                createEnemy();
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed * speedMultiplier;

                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);

                if (checkCollision(player, e)) {
                    gameOver();
                    return;
                }

                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                }
            }

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>

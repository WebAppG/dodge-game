<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dodge Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            text-align: center;
            width: 100vw;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ui-panel {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 15px;
        }

        canvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
            width: 100%;
            max-width: 400px;
            height: auto;
        }

        #screen-overlay {
            position: absolute;
            top: 44px;
            left: 0;
            width: 100%;
            height: calc(100% - 44px);
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.3s ease;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        p {
            margin-bottom: 20px;
            color: #ccc;
            font-size: 14px;
        }

        button {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #00ffcc;
            color: #1a1a1a;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
        }

        button:hover {
            background: #00e6b8;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 25px;
            font-size: 12px;
            color: #777;
        }

        /* Visible Mobile Controls Styles */
        #mobile-controls {
            display: none; /* Hidden by default on desktop */
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
            padding: 15px;
            margin-top: 10px;
        }

        .dir-btn {
            flex: 1;
            margin: 0 10px;
            padding: 15px 0;
            font-size: 18px;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            border-radius: 10px;
            box-shadow: none;
            user-select: none; /* Prevents text highlighting on rapid tapping */
            -webkit-user-select: none;
        }

        .dir-btn:active, .dir-btn.active {
            background: rgba(0, 255, 204, 0.4);
            transform: scale(0.95);
        }

        /* Show controls on smaller screens */
        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-panel">
            <div id="score-display">Score: 0</div>
            <div id="high-score-display">High Score: 0</div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="500"></canvas>

        <div id="screen-overlay">
            <h1 id="overlay-title">DODGE</h1>
            <p id="overlay-desc">Use buttons or Arrows/A/D to move</p>
            <button id="start-btn">PLAY</button>
            <div class="controls-hint">Tip: The longer you survive, the faster they fall!</div>
        </div>

        <div id="mobile-controls">
            <button id="btn-left" class="dir-btn">◀ LEFT</button>
            <button id="btn-right" class="dir-btn">RIGHT ▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const overlay = document.getElementById('screen-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');
        
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        // Game State Variables
        let gameActive = false;
        let score = 0;
        let highScore = 0;

        try {
            highScore = localStorage.getItem('dodge_highScore') || 0;
        } catch (e) {
            console.warn("localStorage is blocked.");
        }
        highScoreDisplay.textContent = `High Score: ${highScore}`;

        let enemySpawnRate = 40; 
        let frameCount = 0;
        let baseEnemySpeed = 3;
        let speedMultiplier = 1;

        const player = {
            x: 185,
            y: 440,
            width: 30,
            height: 30,
            color: '#00ffcc',
            speed: 7,
            dx: 0
        };

        let enemies = [];

        // Input Trackers
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false,
            d: false
        };
        
        let isTouchingLeft = false;
        let isTouchingRight = false;

        // Keyboard Event Listeners
        document.addEventListener('keydown', (e) => {
            if (e.key in keys) keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        // Visible Mobile Button Listeners
        const handleLeftDown = (e) => { e.preventDefault(); isTouchingLeft = true; btnLeft.classList.add('active'); };
        const handleLeftUp = (e) => { e.preventDefault(); isTouchingLeft = false; btnLeft.classList.remove('active'); };
        const handleRightDown = (e) => { e.preventDefault(); isTouchingRight = true; btnRight.classList.add('active'); };
        const handleRightUp = (e) => { e.preventDefault(); isTouchingRight = false; btnRight.classList.remove('active'); };

        btnLeft.addEventListener('touchstart', handleLeftDown, { passive: false });
        btnLeft.addEventListener('touchend', handleLeftUp);
        btnLeft.addEventListener('mousedown', handleLeftDown); // For testing clicks on desktop
        btnLeft.addEventListener('mouseup', handleLeftUp);
        btnLeft.addEventListener('mouseleave', handleLeftUp);

        btnRight.addEventListener('touchstart', handleRightDown, { passive: false });
        btnRight.addEventListener('touchend', handleRightUp);
        btnRight.addEventListener('mousedown', handleRightDown); // For testing clicks on desktop
        btnRight.addEventListener('mouseup', handleRightUp);
        btnRight.addEventListener('mouseleave', handleRightUp);


        startBtn.addEventListener('click', startGame);

        function startGame() {
            enemies = [];
            score = 0;
            frameCount = 0;
            speedMultiplier = 1;
            player.x = canvas.width / 2 - player.width / 2;
            player.dx = 0;
            isTouchingLeft = false;
            isTouchingRight = false;
            scoreDisplay.textContent = `Score: ${score}`;
            
            overlay.style.display = 'none';
            gameActive = true;
            
            requestAnimationFrame(update);
        }

        function createEnemy() {
            const size = Math.random() * (40 - 15) + 15; 
            const x = Math.random() * (canvas.width - size);
            const colors = ['#ff4757', '#ffa502', '#ff6b81', '#ff4757', '#de1f1f'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            enemies.push({
                x: x,
                y: -size,
                width: size,
                height: size,
                speed: (Math.random() * (2 - 0.5) + 0.5) + baseEnemySpeed,
                color: color
            });
        }

        function handlePlayerMovement() {
            if (keys.ArrowLeft || keys.a || isTouchingLeft) {
                player.dx = -player.speed;
            } else if (keys.ArrowRight || keys.d || isTouchingRight) {
                player.dx = player.speed;
            } else {
                player.dx = 0;
            }

            player.x += player.dx;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function gameOver() {
            gameActive = false;
            
            if (score > highScore) {
                highScore = score;
                try {
                    localStorage.setItem('dodge_highScore', highScore);
                } catch (e) {}
                highScoreDisplay.textContent = `High Score: ${highScore}`;
            }

            overlayTitle.textContent = "GAME OVER";
            overlayTitle.style.color = "#ff4757";
            overlayTitle.style.textShadow = "0 0 10px rgba(255, 71, 87, 0.5)";
            overlayDesc.textContent = `Final Score: ${score}`;
            startBtn.textContent = "TRY AGAIN";
            overlay.style.display = 'flex';
            
            // Reset touch states just in case
            isTouchingLeft = false;
            isTouchingRight = false;
            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            handlePlayerMovement();

            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            ctx.shadowBlur = 0;

            frameCount++;
            speedMultiplier = 1 + (score * 0.05); 
            let dynamicSpawnRate = Math.max(15, enemySpawnRate - Math.floor(score / 3));

            if (frameCount % dynamicSpawnRate === 0) {
                createEnemy();
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed * speedMultiplier;

                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);

                if (checkCollision(player, e)) {
                    gameOver();
                    return;
                }

                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                }
            }

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>

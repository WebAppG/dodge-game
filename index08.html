<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dodge Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevents mobile browser pull-to-refresh and zooming */
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            max-width: 400px;
            height: 100%;
            padding: 5px;
        }

        .ui-panel {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
            flex-shrink: 0;
        }

        canvas {
            background-color: #2b2b2b;
            border: 4px solid #444;
            border-radius: 8px;
            width: 100%;
            flex-grow: 1; /* Grows if space is available */
            max-height: 75vh; /* Prevents overflow on 375x667 */
            touch-action: none;
        }

        #swipe-zone {
            width: 100%;
            height: 70px; /* Precise height */
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 12px;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        #mobile-controls {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .dir-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            border-radius: 10px;
            font-weight: bold;
        }

        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .play-btn { padding: 15px 40px; background: #00ffcc; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-panel">
            <div id="score-display">Score: 0</div>
            <div id="high-score-display">High Score: 0</div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <div id="swipe-zone">⟷ SWIPE ZONE ⟷</div>

        <div id="mobile-controls">
            <button id="btn-left" class="dir-btn">LEFT</button>
            <button id="btn-right" class="dir-btn">RIGHT</button>
        </div>

        <div id="screen-overlay">
            <h1>DODGE</h1>
            <div id="difficulty-panel" style="margin: 20px 0;">
                <label><input type="radio" name="difficulty" value="easy" checked> Easy</label>
                <label><input type="radio" name="difficulty" value="medium"> Medium</label>
                <label><input type="radio" name="difficulty" value="hard"> Hard</label>
            </div>
            <button id="start-btn" class="play-btn">PLAY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const swipeZone = document.getElementById('swipe-zone');
        // ... (Keep your existing JS logic for game updates, collision, and difficulty)
        

        // Game State Variables
        let gameActive = false;
        let score = 0;
        let highScore = 0;
        let currentDiff = 'easy';

        try {
            highScore = localStorage.getItem('dodge_highScore') || 0;
        } catch (e) {
            console.warn("localStorage is blocked.");
        }
        highScoreDisplay.textContent = `High Score: ${highScore}`;

        // Difficulty Configurations
        const diffConfig = {
            easy: { baseSpeed: 1.5, speedMultiplierFactor: 0.01, spawnRate: 50, spawnDecreaseRate: 5, minSpawn: 25 },
            medium: { baseSpeed: 2.2, speedMultiplierFactor: 0.025, spawnRate: 45, spawnDecreaseRate: 4, minSpawn: 20 },
            hard: { baseSpeed: 3.0, speedMultiplierFactor: 0.05, spawnRate: 40, spawnDecreaseRate: 3, minSpawn: 15 }
        };

        let frameCount = 0;
        let speedMultiplier = 1;

        const player = {
            x: 185,
            y: 440,
            width: 30,
            height: 30,
            color: '#00ffcc',
            speed: 7,
            dx: 0
        };

        let enemies = [];

        // Input Trackers
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };
        let isTouchingLeft = false;
        let isTouchingRight = false;
        let isSwiping = false; 

        // Keyboard Event Listeners
        document.addEventListener('keydown', (e) => { if (e.key in keys) keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { if (e.key in keys) keys[e.key] = false; });


        // Ensure Swipe Zones use the same logic
        function handleSwipe(e) {
            if (!gameActive) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            player.x = ((touch.clientX - rect.left) * scaleX) - (player.width / 2);
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            isSwiping = true;
        }

        canvas.addEventListener('touchmove', handleSwipe, {passive:false});
        swipeZone.addEventListener('touchmove', handleSwipe, {passive:false});
        canvas.addEventListener('touchend', () => isSwiping = false);
        swipeZone.addEventListener('touchend', () => isSwiping = false);

        // ... Add your remaining existing game functions (startGame, update, etc)

        // Visible Mobile Button Listeners
        const handleLeftDown = (e) => { e.preventDefault(); isTouchingLeft = true; btnLeft.classList.add('active'); };
        const handleLeftUp = (e) => { e.preventDefault(); isTouchingLeft = false; btnLeft.classList.remove('active'); };
        const handleRightDown = (e) => { e.preventDefault(); isTouchingRight = true; btnRight.classList.add('active'); };
        const handleRightUp = (e) => { e.preventDefault(); isTouchingRight = false; btnRight.classList.remove('active'); };

        btnLeft.addEventListener('touchstart', handleLeftDown, { passive: false });
        btnLeft.addEventListener('touchend', handleLeftUp);
        btnLeft.addEventListener('mousedown', handleLeftDown);
        btnLeft.addEventListener('mouseup', handleLeftUp);
        btnLeft.addEventListener('mouseleave', handleLeftUp);

        btnRight.addEventListener('touchstart', handleRightDown, { passive: false });
        btnRight.addEventListener('touchend', handleRightUp);
        btnRight.addEventListener('mousedown', handleRightDown);
        btnRight.addEventListener('mouseup', handleRightUp);
        btnRight.addEventListener('mouseleave', handleRightUp);

        startBtn.addEventListener('click', startGame);

        function startGame() {
            const selectedRadio = document.querySelector('input[name="difficulty"]:checked');
            if(selectedRadio) currentDiff = selectedRadio.value;

            enemies = [];
            score = 0;
            frameCount = 0;
            speedMultiplier = 1;
            player.x = canvas.width / 2 - player.width / 2;
            player.dx = 0;
            isTouchingLeft = false;
            isTouchingRight = false;
            isSwiping = false;
            scoreDisplay.textContent = `Score: ${score}`;
            
            overlay.style.display = 'none';
            gameActive = true;
            
            requestAnimationFrame(update);
        }

        function createEnemy() {
            const size = Math.random() * (40 - 15) + 15; 
            const x = Math.random() * (canvas.width - size);
            const colors = ['#ff4757', '#ffa502', '#ff6b81', '#ff4757', '#de1f1f'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            let config = diffConfig[currentDiff];
            enemies.push({
                x: x,
                y: -size,
                width: size,
                height: size,
                speed: (Math.random() * (2 - 0.5) + 0.5) + config.baseSpeed,
                color: color
            });
        }

        function handlePlayerMovement() {
            if (!isSwiping) {
                if (keys.ArrowLeft || keys.a || isTouchingLeft) {
                    player.dx = -player.speed;
                } else if (keys.ArrowRight || keys.d || isTouchingRight) {
                    player.dx = player.speed;
                } else {
                    player.dx = 0;
                }

                player.x += player.dx;

                if (player.x < 0) player.x = 0;
                if (player.x + player.width > canvas.width) {
                    player.x = canvas.width - player.width;
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function gameOver() {
            gameActive = false;
            
            if (score > highScore) {
                highScore = score;
                try {
                    localStorage.setItem('dodge_highScore', highScore);
                } catch (e) {}
                highScoreDisplay.textContent = `High Score: ${highScore}`;
            }

            overlayTitle.textContent = "GAME OVER";
            overlayTitle.style.color = "#ff4757";
            overlayTitle.style.textShadow = "0 0 10px rgba(255, 71, 87, 0.5)";
            overlayDesc.textContent = `Final Score: ${score}`;
            startBtn.textContent = "TRY AGAIN";
            
            diffPanel.style.display = 'flex';
            overlay.style.display = 'flex';
            
            isTouchingLeft = false;
            isTouchingRight = false;
            isSwiping = false;
            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handlePlayerMovement();

            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            frameCount++;
            
            let config = diffConfig[currentDiff];
            speedMultiplier = 1 + (score * config.speedMultiplierFactor); 
            
            let dynamicSpawnRate = Math.max(
                config.minSpawn, 
                config.spawnRate - Math.floor(score / config.spawnDecreaseRate)
            );

            if (frameCount % dynamicSpawnRate === 0) {
                createEnemy();
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed * speedMultiplier;

                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);

                if (checkCollision(player, e)) {
                    gameOver();
                    return;
                }

                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                }
            }

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
